services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cle_nginx
    depends_on:
      - php-fpm
    ports:
      - "8080:80"
    volumes:
      - ./apps/backend:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cle_php
    working_dir: /var/www/html
    volumes:
      - ./apps/backend:/var/www/html:delegated
    environment:
      APP_ENV: local
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    depends_on:
      - mysql
      - redis
    networks:
      - app

  mysql:
    image: mysql:8.4
    container_name: cle_mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: commerce_leads
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app

  redis:
    image: redis:7.2-alpine
    container_name: cle_redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    networks:
      - app

  crawler:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: cle_crawler
    working_dir: /workspace/apps/crawler
    volumes:
      - ./apps/crawler:/workspace/apps/crawler:delegated
    environment:
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-commerce_leads}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    command: sleep infinity
    networks:
      - app

volumes:
  mysql_data:
  redis_data:

networks:
  app:
    driver: bridge
